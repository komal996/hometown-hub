<!DOCTYPE html>
<html>
<head>
  <title>Community Dashboard</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #00f2fe, #764ba2);
      color: #fff;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      flex: 1;
      min-width: 300px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin: 5px 5px 5px 0;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 500;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #ff7eb3, #ff758c);
    }

    .card {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .announcement {
      background: rgba(255,255,0,0.3);
      color: black;
    }

    h3 {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2>✨ Community Dashboard</h2>

<div class="container">

  <!-- Notifications -->
  <div class="box">
    <h3>🔔 Notifications</h3>
    <div id="notifications"></div>
  </div>

  <!-- Posts -->
  <div class="box">
    <h3>Create Post</h3>

    <input id="postText" placeholder="Write something..." />

    <label>
      <input type="checkbox" id="isAnnouncement"> Announcement
    </label>

    <button onclick="addPost()">Post</button>

    <h3>📢 Announcements</h3>
    <div id="announcements"></div>

    <h3>📝 Posts</h3>
    <div id="posts"></div>
  </div>

  <!-- Events -->
  <div class="box">
    <h3>Create Event</h3>
    <input id="eventTitle" placeholder="Event title" />
    <input type="date" id="eventDate" />
    <button onclick="addEvent()">Create</button>

    <h3>📅 Event List</h3>
    <div id="events"></div>
  </div>

</div>

<script>

const API = "https://hometown-hub-bswj.onrender.com/api";

/* ================= POSTS ================= */

async function addPost() {
  const text = document.getElementById("postText").value;
  const isAnnouncement = document.getElementById("isAnnouncement").checked;

  if (!text) return alert("Write something!");

  await fetch(`${API}/posts`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text, isAnnouncement })
  });

  document.getElementById("postText").value = "";
  loadPosts();
  loadNotifications();
}

async function loadPosts() {
  const res = await fetch(`${API}/posts`);
  const data = await res.json();

  let postsHTML = "";
  let announcementsHTML = "";

  data.forEach(p => {
    const card = `
      <div class="card ${p.isAnnouncement ? 'announcement' : ''}">
        ${p.text}<br><br>

        <button onclick="editPost('${p.id}')">Edit</button>
        <button onclick="deletePost('${p.id}')">Delete</button>
        <button onclick="sharePost(\`${p.text}\`)">Share</button>
      </div>
    `;

    if (p.isAnnouncement) announcementsHTML += card;
    else postsHTML += card;
  });

  document.getElementById("posts").innerHTML = postsHTML;
  document.getElementById("announcements").innerHTML = announcementsHTML;
}

async function editPost(id) {
  const text = prompt("Edit post:");
  if (!text) return;

  await fetch(`${API}/posts/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  loadPosts();
  loadNotifications();
}

async function deletePost(id) {
  if (!confirm("Delete this post?")) return;

  await fetch(`${API}/posts/${id}`, { method: "DELETE" });

  loadPosts();
  loadNotifications();
}

/* SHARE */
function sharePost(text) {
  const url = window.location.href;

  if (navigator.share) {
    navigator.share({ title: "Post", text, url });
  } else {
    navigator.clipboard.writeText(text + " " + url);
    window.open(`https://wa.me/?text=${encodeURIComponent(text + " " + url)}`);
  }
}

/* ================= EVENTS ================= */

async function addEvent() {
  const title = document.getElementById("eventTitle").value;
  const date = document.getElementById("eventDate").value;

  if (!title || !date) return alert("Fill all fields!");

  await fetch(`${API}/events`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, date })
  });

  document.getElementById("eventTitle").value = "";
  document.getElementById("eventDate").value = "";

  loadEvents();
  loadNotifications();
}

async function loadEvents() {
  const res = await fetch(`${API}/events`);
  const data = await res.json();

  let html = "";

  data.forEach(e => {
    html += `
      <div class="card">
        <b>${e.title}</b><br>
        ${e.date}<br>
        Joined: ${e.joined || 0}<br><br>

        <button onclick="joinEvent('${e.id}')">Join</button>
        <button onclick="editEvent('${e.id}')">Update</button>
        <button onclick="deleteEvent('${e.id}')">Delete</button>
      </div>
    `;
  });

  document.getElementById("events").innerHTML = html;
}

async function joinEvent(id) {
  await fetch(`${API}/events/join/${id}`, { method: "POST" });
  loadEvents();
  loadNotifications();
}

async function editEvent(id) {
  const title = prompt("New title:");
  if (!title) return;

  await fetch(`${API}/events/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title })
  });

  loadEvents();
  loadNotifications();
}

async function deleteEvent(id) {
  if (!confirm("Delete event?")) return;

  await fetch(`${API}/events/${id}`, { method: "DELETE" });

  loadEvents();
  loadNotifications();
}

/* ================= NOTIFICATIONS ================= */

async function loadNotifications() {
  const res = await fetch(`${API}/notifications`);
  const data = await res.json();

  let html = "";

  data.forEach(n => {
    html += `<div class="card">${n.message}</div>`;
  });

  document.getElementById("notifications").innerHTML = html;
}

/* INIT */
window.onload = () => {
  loadPosts();
  loadEvents();
  loadNotifications();
};

</script>

</body>
</html>
