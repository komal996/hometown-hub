<!DOCTYPE html>
<html>
<head>
  <title>Select Hometown</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #00f2fe, #764ba2);
    }

    /* Card */
    .card {
      width: 360px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      color: white;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* Input group */
    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    select, input {
      width: 100%;
      padding: 12px 40px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    /* Icons */
    .input-group span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 14px;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00d4ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #00a8cc;
      transform: scale(1.03);
    }

    /* Message */
    #msg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }

  </style>
</head>

<body>

<div class="card">
  <h2>🏡 Choose Your Hometown</h2>

  <form id="hometownForm">

    <div class="input-group">
      <span>📍</span>
      <select id="type" required>
        <option value="">Select Type</option>
        <option value="City">🏙 City</option>
        <option value="Village">🌾 Village</option>
      </select>
    </div>

    <div class="input-group">
      <span>🏠</span>
      <input type="text" id="hometown" placeholder="Enter City/Village Name" required>
    </div>

    <button type="submit">Save & Continue</button>

  </form>

  <p id="msg"></p>
</div>

<script>
document.getElementById("hometownForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const type = document.getElementById("type").value;
  const hometown = document.getElementById("hometown").value;

  try {
    const token = localStorage.getItem("token");

    const res = await fetch("https://hometown-hub-bswj.onrender.com/api/hometown", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ type, hometown })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById("msg").innerText = "✅ Saved successfully";

      setTimeout(() => {
        window.location.href = "community.html";
      }, 1200);

    } else {
      document.getElementById("msg").innerText = data.message || "❌ Failed";
    }

  } catch (err) {
    document.getElementById("msg").innerText = "❌ Server error";
  }
});
</script>

</body>
</html>
