<!DOCTYPE html>
<html>
<head>
  <title>Community</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #00f2fe, #764ba2);
    }

    /* Card */
    .card {
      width: 360px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      color: white;
      animation: fadeIn 0.8s ease-in-out;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* Input */
    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 40px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .input-group span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00d4ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a8cc;
      transform: scale(1.03);
    }

    /* Message */
    #msg {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 500;
    }

  </style>
</head>

<body>

<div class="card">
  <h2>👥 Join Your Community</h2>

  <div class="input-group">
    <span>🌐</span>
    <input 
      type="text" 
      id="communityName" 
      placeholder="Enter Community Name (e.g. Pune Community)" 
      required
    >
  </div>

  <button onclick="handleCommunity()">Continue</button>

  <p id="msg"></p>
</div>

<script>
async function handleCommunity() {
  const name = document.getElementById("communityName").value;
  const token = localStorage.getItem("token");

  if (!name) {
    document.getElementById("msg").innerText = "❌ Please enter community name";
    return;
  }

  try {
    const res = await fetch("https://hometown-hub-bswj.onrender.com/api/community", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ name })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
      data.message || "✅ Community created";

    if (res.status === 200 || res.status === 201) {
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    }

  } catch (err) {
    document.getElementById("msg").innerText = "❌ Something went wrong";
  }
}
</script>

</body>
</html>
